name: Release

# Publishes via npm trusted publishing (OIDC) — no NPM_TOKEN secret needed.
# One-time setup on npmjs.com: package Settings → Trusted Publisher →
# GitHub Actions, repository pbpeterson/typed-fetch, workflow release.yml.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # Trusted publishing requires npm >= 11.5
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: npm publish --provenance --access public
